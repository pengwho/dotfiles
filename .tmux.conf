# 顏色支援
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# 滑鼠支援
set -g mouse on

# 視窗編號從 1 開始（不從 0）
set -g base-index 1

# 狀態列顏色
set -g status-style "bg=#394260 fg=#769ff0"

# 左側顯示 session 名稱
set -g status-left "#[bg=#a3aed2,fg=#090c0c,bold]  #S #[bg=#394260,fg=#a3aed2]"
set -g status-left-length 40

# 右側顯示時間日期
set -g status-right "#[fg=#a3aed2,bg=#394260]#[bg=#a3aed2,fg=#090c0c] %H:%M  %d %b "
set -g status-right-length 40

# 視窗標籤
set -g window-status-format "#[fg=#769ff0,bg=#394260] #I #W "
set -g window-status-current-format "#[bg=#769ff0,fg=#090c0c,bold] #I #W "

# 分割線顏色
set -g pane-border-style "fg=#394260"
set -g pane-active-border-style "fg=#769ff0"

# 快速 reload 設定
bind r source-file ~/.tmux.conf \; display "Config reloaded!"
